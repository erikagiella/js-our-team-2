<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>
    <header class="bg-dark">
        <div class="container">
            <div class="navbar py-2">
                <a class="navbar-brand d-flex align-items-center gap-3 text-white" href="#">
                    <img class="rounded-5" src="https://ui-avatars.com/api/?name=PP&background=FFDE00&color=000&size=50"
                        alt="logo">
                    <h1 class="display-6">PincoPallo & co.</h1>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="containter">
            <!--Jumbotron-->
            <section class="bg-light py-5 mb-4">
                <div class="text-center">
                    <h2 class="display-4">Il nostro team</h2>
                    <p class="lead">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                </div>
            </section>
            <!--Form add team's member-->
            <section>
                <div class="container">
                    <h2 class="display-6 text-center mb-4">Aggiungi un membro del team</h2>
                    <div class="mb-3">
                        <label for="nameField" class="form-label">Nome e Cognome</label>
                        <input type="text" class="form-control" id="nameField" placeholder="Inserisci nome e cognome">
                    </div>
                    <div class="mb-3">
                        <label for="roleField" class="form-label">Ruolo</label>
                        <input type="text" class="form-control" id="roleField" placeholder="Ruolo">
                    </div>
                    <div class="mb-3">
                        <label for="emailField" class="form-label">Indirizzo Email</label>
                        <input type="email" class="form-control" id="emailField" placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="memberPicField" class="form-label">Foto profilo</label>
                        <input type="url" class="form-control" id="memberPicField" placeholder="name@example.com">
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Aggiungi nuovo membro</button>
                    </div>
                </div>
            </section>
            <!--Our Team-->
            <section class="py-5">
                <div class="container">
                    <h2 class="display-6 text-center mb-4">Il team al completo</h2>
                    <ul id="list">

                    </ul>
                </div>
            </section>
        </div>
    </main>


    <footer class="bg-dark py-3">
        <div class="container">
            <h3 class="display-6 fs-6 text-center text-white">Tutti i diritti riservati a PincoPallo & co.</h3>
        </div>
    </footer>

    <script src="./assets/script.js"></script>
</body>

</html>
